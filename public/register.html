<!DOCTYPE html>

<html class="dark" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Acceso | Museos TAPI</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&amp;family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="js/config.js?v=1.3"></script>
<link href="css/main.css?v=1.3" rel="stylesheet"/>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center p-6 transition-colors duration-300">
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none">
<div class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_20%_30%,#0032A0_0%,transparent_50%),radial-gradient(circle_at_80%_70%,#c5a065_0%,transparent_50%)]">
</div>
</div>
<div class="relative z-10 w-full max-w-md">
<!-- Logo -->
<div class="text-center mb-8">
<a class="inline-flex items-center gap-3 hover:opacity-80 transition-opacity" href="index.html">
<img alt="Museos TAPI" class="h-12 w-auto invert dark:invert-0" data-i18n-alt="museos_tapi" src="recursos/images/tapi-logo.svg"/>
<div class="flex flex-col text-left leading-none uppercase tracking-tighter">
<span class="text-xl font-black bg-clip-text text-transparent bg-gradient-to-r from-primary via-white to-accent-gold" data-i18n="museos_tapi_1">Museos
                        TAPI</span>
<span class="text-[10px] font-bold text-gray-500" data-i18n="portal_de_usuario">Portal de Usuario</span>
</div>
</a>
</div>
<!-- Card -->
<div class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border border-slate-200 dark:border-slate-800 rounded-3xl p-8 shadow-2xl">
<div class="mb-8" id="auth-header">
<h1 class="text-3xl font-black uppercase tracking-tight mb-2" data-i18n="bienvenido">Bienvenido</h1>
<p class="text-slate-500 dark:text-gray-400" data-i18n="ingrese_sus_credenciales_para_acceder_al">Ingrese sus credenciales para acceder al complejo.</p>
</div>
<form class="space-y-6" id="auth-form">
<div>
<label class="block text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-gray-500 mb-2" data-i18n="email_usuario">Email
                        / Usuario</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
<input class="w-full bg-slate-100 dark:bg-slate-800 border-transparent focus:border-primary dark:focus:border-accent-gold rounded-xl py-4 pl-12 pr-4 text-sm transition-all focus:ring-0" data-i18n-placeholder="nombreejemplocom" placeholder="nombre@ejemplo.com" type="email"/>
</div>
</div>
<div>
<label class="block text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-gray-500 mb-2" data-i18n="contrasea">Contraseńa</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
<input class="w-full bg-slate-100 dark:bg-slate-800 border-transparent focus:border-primary dark:focus:border-accent-gold rounded-xl py-4 pl-12 pr-4 text-sm transition-all focus:ring-0" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center justify-between text-xs pt-2">
<label class="flex items-center gap-2 cursor-pointer text-slate-600 dark:text-gray-400" data-i18n="recurdame">
<input class="rounded text-primary focus:ring-primary bg-slate-100 dark:bg-slate-800 border-transparent" type="checkbox"/>
                        Recuérdame
                    </label>
<a class="text-accent-gold hover:underline font-bold" data-i18n="olvid_su_contrasea" href="#">żOlvidó su contraseńa?</a>
</div>
<button class="w-full bg-gradient-to-r from-primary to-primary-hover text-white py-4 rounded-xl font-black uppercase tracking-widest text-sm shadow-lg shadow-primary/30 hover:shadow-primary/50 hover:scale-[1.02] active:scale-[0.98] transition-all" data-i18n="iniciar_sesin" type="submit">
                    Iniciar Sesión
                </button>
</form>
<div class="mt-10 pt-8 border-t border-slate-200 dark:border-slate-800 text-center">
<p class="text-sm text-slate-500 dark:text-gray-400 mb-4" data-i18n="no_tiene_una_cuenta">żNo tiene una cuenta?</p>
<button class="px-8 py-3 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-xl text-xs font-bold uppercase tracking-widest transition-all" data-i18n="crear_nueva_cuenta" onclick="toggleAuthMode()">
                    Crear Nueva Cuenta
                </button>
</div>
</div>
<div class="mt-8 text-center">
<a class="inline-flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-white transition-all uppercase tracking-widest" data-i18n="arrowback_volver_al_portal_principal" href="index.html">
<span class="material-symbols-outlined text-sm">arrow_back</span>
                Volver al Portal Principal
            </a>
</div>
</div>
<script>
        function toggleAuthMode() {
            const h1 = document.querySelector('#auth-header h1');
            const p = document.querySelector('#auth-header p');
            const submitBtn = document.querySelector('button[type="submit"]');
            const toggleBtn = document.querySelector('.mt-10 button');
            const toggleLabel = document.querySelector('.mt-10 p');

            if (h1.innerText === 'BIENVENIDO') {
                h1.innerText = 'REGISTRO';
                p.innerText = 'Únase a nuestra comunidad de entusiastas de la historia.';
                submitBtn.innerText = 'Crear Cuenta';
                toggleBtn.innerText = 'Ya tengo cuenta';
                toggleLabel.innerText = 'żYa eres miembro?';
            } else {
                h1.innerText = 'BIENVENIDO';
                p.innerText = 'Ingrese sus credenciales para acceder al complejo.';
                submitBtn.innerText = 'Iniciar Sesión';
                toggleBtn.innerText = 'Crear Nueva Cuenta';
                toggleLabel.innerText = 'żNo tiene una cuenta?';
            }
        }
    </script>
<script defer="True" src="js/i18n.js?v=1.3"></script></body>
</html>

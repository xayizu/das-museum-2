<!DOCTYPE html>
<html class="dark" lang="es">

<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link id="favicon" rel="icon" type="image/svg+xml" href="../recursos/images/index/favicon_pestaña.svg?v=405" />
    <link rel="icon" type="image/png" sizes="48x48" href="../recursos/images/index/favicon-48.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="../recursos/images/index/favicon-144.png" />

    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Tour Virtual | CASA HISTRICA</title>



    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&family=Noto+Sans:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Estilos especficos del proyecto -->
    <script src="../js/config.js?v=405"></script>
    <link href="../css/main.css?v=405" rel="stylesheet" />

    <!-- Scripts de Funcionalidad -->
    <script defer src="../js/i18n.js?v=405"></script>
    <script defer src="../js/main.js?v=405"></script>
    <script defer src="../js/components-loader.js?v=405"></script>

    <!-- Supabase integration -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase/client.js?v=405"></script>
    <script src="../js/supabase/auth.js?v=405"></script>
    <script src="../js/supabase/stats.js?v=405"></script>
    <script src="../js/supabase/realtime.js?v=405"></script>
    <script src="../js/supabase/ui-bridge.js?v=405"></script>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 overflow-x-hidden min-h-screen flex flex-col"
    data-root="../">

    <!-- COMPONENTES CARGADOS DINMICAMENTE (Casa - Gold Theme) -->
    <div data-include="casa/topbar"></div>

    <!-- SISTEMA DE AUDIO (Sincronizado con el botn del Topbar) -->
    <audio id="bg-music" loop src="../recursos/audio/background-military.mp3"></audio>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="flex-grow pt-\[110px\] md:pt-[100px] px-6">
        <div class="max-w-[1200px] mx-auto py-12">

            <header class="mb-12 pb-6">
                <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tighter text-white mb-2"
                    data-i18n="tour_virtual">Tour Virtual</h1>
                <p class="uppercase tracking-widest text-xs font-bold text-accent-gold" data-i18n="casa_histrica_title">
                    CASA HISTRICA</p>
            </header>

            <!-- ESPACIO PARA EL CONTENIDO -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-white/5 p-8 rounded-2xl border border-white/10 backdrop-blur-sm">
                    <h2 class="text-xl font-bold text-accent-gold mb-4" data-i18n="tour_virtual">Tour Virtual</h2>
                    <p class="text-gray-400">Contenido especfico de Tour Virtual para la Casa Histrica.</p>
                </div>
            </div>

        </div>
    </main>

    <!-- FOOTER CARGADO DINMICAMENTE -->
    <div data-include="casa/footer"></div>

    <!-- INICIALIZACIN DE SISTEMAS POST-CARGA -->
    <script>
        window.addEventListener('componentsReady', () => {
            setTimeout(() => {
                if (window.StatsManager) {
                    window.StatsManager.updateUI();
                    window.StatsManager.subscribeRealtime();
                }
            }, 300);
        });
    </script>
</body>

</html>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 overflow-x-hidden min-h-screen flex flex-col"
    data-root="../../">

    <!-- COMPONENTES CARGADOS DINÁMICAMENTE (Tanques - Blue Theme) -->

    <div class="overlay fixed inset-0 z-[90]" id="left-overlay" onclick="toggleLeftMenu()"></div>
    <div data-include="tanques/topbar"></div>

    <!-- SISTEMA DE AUDIO -->
    <audio id="bg-music" loop src="../../recursos/audio/background-military.mp3"></audio>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="flex-grow pt-[100px] md:pt-[60px] px-6" id="main-detail-tank" data-tank-id="0"
        data-tank-short="0"
        data-tank-img="https://lh3.googleusercontent.com/aida-public/AB6AXuBQ2RSwEOvaSzJx3w8KGB4ZRMErexxfT1s_0JAeN-hrxdj-E86JpPbFto2kxTyBym5z6NG-jt04eQQYUh_5RP4VgPcu-AkGQ62cVA_JvpLAp9Q_7Ip-15EmBpMnzCImsaNHjiwUYOg5X4lNROKSNUGpettwbImchAv_LPtND5XSmZeBEWOE0bDaUon1TnY9Y-xFTNt_9a_4qex7blEKK4ZxknXG2zjH7jNb2gomDOjn2nApcfIW6tzfYkkHIcaSuybyk3YZqbMJdb4n"
        data-tank-blueprint="https://lh3.googleusercontent.com/aida-public/AB6AXuBJIBOXPUpgAD7zei5-axrGQt2nAvL2eRgZTszWp0Ceue3gU60lKJWl2Vf1hHtqV3ckBEZsEl_jfPQVGk4xZTmIm0M9iuEENqTaoOe_ChKCcVDELh_QHDLW-9mYhDU7U53Wy2b1w1on2phTt1qlEzIAqOUPQcGG1Nd5lFg6xoEm_G2uL7QbZHT8R4lMRhZ_OivSnl5M8m2Lj2-5yAztFprnaW_p2RU92BmXSiHOPruak8kI6WW5DqUjqFrARBewHm_AtdUms_EQ5gOS">

        <!-- El cuerpo se carga dinámicamente desde el componente local -->
        <div data-include="../museo-tanques/4.1hangar/componentes/ficha_tanque"></div>

    </main>

    <!-- FOOTER CARGADO DINÁMICAMENTE -->
    <div data-include="tanques/footer"></div>

    <!-- SCRIPT DE MANEJO DE PLANTILLA -->
    <script>
        window.addEventListener('componentsReady', () => {
            const main = document.getElementById('main-detail-tank');
            if (!main) return;

            const tankId = main.getAttribute('data-tank-id');
            const tankShort = main.getAttribute('data-tank-short');
            const tankImg = main.getAttribute('data-tank-img');
            const tankBlueprint = main.getAttribute('data-tank-blueprint');

            // Buscamos el wrapper inyectado
            const wrapper = main.querySelector('#tank-content-wrapper');
            if (wrapper) {
                let html = wrapper.innerHTML;

                // Reemplazamos los placeholders por los datos del tanque actual
                html = html.replace(/{{TNK}}/g, tankId);
                html = html.replace(/{{TNK_SHORT}}/g, tankShort);
                html = html.replace(/##IMAGE_URL##/g, tankImg);
                html = html.replace(/##BLUEPRINT_URL##/g, tankBlueprint);

                wrapper.innerHTML = html;

                // Forzamos actualización de traducciones para el contenido inyectado
                if (window.i18n) {
                    window.i18n.updateUI();
                }

                // Sincronizamos estadísticas si el manager existe
                setTimeout(() => {
                    if (window.StatsManager) {
                        window.StatsManager.updateUI();
                    }
                }, 100);
            }
        });

        // Las funciones para el modelo 3D ahora se gestionan en el componente modal_3d.html

    </script>
</body>

</html>

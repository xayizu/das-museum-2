<!DOCTYPE html>
<html class="dark" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>T-34-85 | Detalle - MUSEO DE TANQUES</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&family=Noto+Sans:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Estilos específicos del proyecto -->
    <script src="../../js/config.js?v=DateRef305"></script>
    <link href="../../css/main.css?v=DateRef305" rel="stylesheet" />

    <!-- Scripts de Funcionalidad -->
    <script defer src="../../js/i18n.js?v=DateRef305"></script>
    <script defer src="../../js/main.js?v=307"></script>
    <script defer src="../../js/components-loader.js?v=DateRef305"></script>

    <!-- Supabase integration -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/supabase/client.js"></script>
    <script src="../../js/supabase/auth.js"></script>
    <script src="../../js/supabase/stats.js"></script>
    <script src="../../js/supabase/realtime.js?v=310?v=310"></script>
    <script src="../../js/supabase/ui-bridge.js"></script>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 overflow-x-hidden min-h-screen flex flex-col"
    data-root="../../">

    <!-- COMPONENTES CARGADOS DINÁMICAMENTE (Tanques - Blue Theme) -->
    <div data-include="tanques/sidebar"></div>
    <div class="overlay fixed inset-0 z-[90]" id="left-overlay" onclick="toggleLeftMenu()"></div>
    <div data-include="tanques/topbar"></div>

    <!-- SISTEMA DE AUDIO -->
    <audio id="bg-music" loop src="../../recursos/audio/background-military.mp3"></audio>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="flex-grow pt-[100px] md:pt-[60px] px-6" id="main-detail-tank" data-tank-id="4" data-tank-short="4"
        data-tank-img="https://lh3.googleusercontent.com/aida-public/AB6AXuDa_VIFi7apusFR3inD8fSQuq9y2iJS6etx45n4XJrEDVsWVLSEjoOmX_mRmmaFBCFKMiBoONhZzRdvFu8JqixFTx46n-K0YCI-4EKndiwkYFgHD3TrPbestTXl70kVbQK3NzwsE9WXGzqwNqGkwTzEH_cW5wFhel9Qwd9iWJtctJzTD13h_7cQwc7pdRrmoNaFNzqXOsS8yG0U7agFWt462k3NzWAfotajyqIFzs9hxe08OhogwArNj4nMChW0WBoP-RCU4DR7l9eB"
        data-tank-blueprint="https://images.unsplash.com/photo-1599252041753-3932880017fd?q=80&w=2000&auto=format&fit=crop">

        <!-- El cuerpo se carga dinámicamente desde el componente local -->
        <div data-include="../museo-tanques/4.1hangar/componentes/ficha_tanque"></div>

    </main>

    <!-- FOOTER CARGADO DINÁMICAMENTE -->
    <div data-include="tanques/footer"></div>

    <!-- SCRIPT DE MANEJO DE PLANTILLA -->
    <script>
        window.addEventListener('componentsReady', () => {
            const main = document.getElementById('main-detail-tank');
            if (!main) return;

            const tankId = main.getAttribute('data-tank-id');
            const tankShort = main.getAttribute('data-tank-short');
            const tankImg = main.getAttribute('data-tank-img');
            const tankBlueprint = main.getAttribute('data-tank-blueprint');

            // Buscamos el wrapper inyectado
            const wrapper = main.querySelector('#tank-content-wrapper');
            if (wrapper) {
                let html = wrapper.innerHTML;

                // Reemplazamos los placeholders por los datos del tanque actual
                html = html.replace(/{{TNK}}/g, tankId);
                html = html.replace(/{{TNK_SHORT}}/g, tankShort);
                html = html.replace(/##IMAGE_URL##/g, tankImg);
                html = html.replace(/##BLUEPRINT_URL##/g, tankBlueprint);

                wrapper.innerHTML = html;

                // Forzamos actualización de traducciones para el contenido inyectado
                if (window.i18n) {
                    window.i18n.updateUI();
                }

                // Sincronizamos estadísticas si el manager existe
                setTimeout(() => {
                    if (window.StatsManager) {
                        window.StatsManager.updateUI();
                    }
                }, 100);
            }
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html class="dark" lang="es">

<head>
    <link id="favicon" rel="icon" type="image/svg+xml" href="../recursos/images/index/favicon_pestaña.svg?v=1.1" />
    <link rel="icon" type="image/png" sizes="48x48" href="../recursos/images/index/favicon-48.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="../recursos/images/index/favicon-144.png" />

    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Página Base | MUSEOS TAPI</title>



    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&family=Noto+Sans:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Estilos específicos del proyecto -->
    <script src="../js/config.js?v=1.3"></script>
    <link href="../css/main.css?v=1.3" rel="stylesheet" />

    <!-- Scripts de Funcionalidad -->
    <script defer src="../js/i18n.js?v=1.3"></script>
    <script defer src="../js/main.js?v=307"></script>
    <script defer src="../js/components-loader.js?v=1.3"></script>

    <!-- Supabase integration -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase/client.js"></script>
    <script src="../js/supabase/auth.js"></script>
    <script src="../js/supabase/stats.js"></script>
    <script src="../js/supabase/realtime.js?v=393?v=393?v=393?v=393?v=393"></script>
    <script src="../js/supabase/ui-bridge.js"></script>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 overflow-x-hidden min-h-screen flex flex-col"
    data-root="../">

    <!-- COMPONENTES CARGADOS DINÁMICAMENTE (Tanques - Blue Theme) -->
    <div data-include="tanques/sidebar"></div>
    <div class="overlay fixed inset-0 z-[90]" id="left-overlay" onclick="toggleLeftMenu()"></div>
    <div data-include="tanques/topbar"></div>

    <!-- SISTEMA DE AUDIO (Sincronizado con el botón del Topbar) -->
    <audio id="bg-music" loop src="../recursos/audio/background-military.mp3"></audio>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="flex-grow pt-[100px] md:pt-[60px] px-[10px]">
        <div class="max-w-[1200px] mx-auto py-12">

            <header class="mb-12 pb-6">
                <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tighter text-white mb-2"
                    data-i18n="titulo_pagina">NOMBRE DE PÁGINA</h1>
                <p class="uppercase tracking-widest text-xs font-bold text-primary" data-i18n="museo_de_tanques_title">
                    MUSEO DE TANQUES</p>
            </header>

            <!-- ESPACIO PARA EL CONTENIDO -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-white/5 p-8 rounded-2xl border border-white/10 backdrop-blur-sm">
                    <h2 class="text-xl font-bold text-primary mb-4" data-i18n="detalle_seccion">Sección de Contenido
                    </h2>
                    <p class="text-gray-400">Esta página utiliza el sistema de componentes dinámicos con todas las
                        funciones del museo principal activas (música, estadísticas, idiomas y redes sociales).</p>
                </div>
            </div>

        </div>
    </main>

    <!-- FOOTER CARGADO DINÁMICAMENTE -->
    <div data-include="tanques/footer"></div>

    <!-- INICIALIZACIÓN DE SISTEMAS POST-CARGA -->
    <script>
        // Sincronizar estadísticas una vez que los componentes (footer con sus IDs) están listos
        window.addEventListener('componentsReady', () => {
            console.log('📦 Componentes listos en Subpágina. Sincronizando estadísticas...');

            // Pequeño retardo para asegurar que Supabase (client.js) haya terminado de asignar window.sb
            setTimeout(() => {
                if (window.StatsManager) {
                    // Actualizar UI inmediatamente
                    window.StatsManager.updateUI();
                    // Suscribirse a cambios en tiempo real
                    window.StatsManager.subscribeRealtime();
                }
            }, 300);
        });
    </script>
</body>

</html>

    <link rel="icon" type="image/png" sizes="48x48" href="recursos/images/index/favicon-48.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="recursos/images/index/favicon-144.png" />

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Forma - Caballo</title>


    <link rel="stylesheet" href="./css/horse-cursor.css">
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
        }

        /* Forzamos que el cursor sea visible y estático en el centro */
        #horse-cursor {
            position: relative !important;
            opacity: 1 !important;
            transform: none !important;
            top: auto !important;
            left: auto !important;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #444;
            z-index: 1000000;
        }

        button {
            background: #4a4a4a;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }

        button:hover {
            background: #666;
        }

        .hint {
            margin-top: 15px;
            font-size: 0.8em;
            color: #aaa;
            line-height: 1.4;
        }

        code {
            background: #333;
            padding: 2px 4px;
            border-radius: 3px;
        }
    </style>
</head>
